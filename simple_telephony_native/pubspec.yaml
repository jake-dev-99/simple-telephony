name: simple_telephony_native
description: >-
  Android telephony plugin for Flutter. Receive and control phone calls via
  InCallService when registered as the default dialer. Supports foreground
  event streaming and background delivery with at-least-once guarantees.
version: 0.3.0
homepage: https://www.simplezen.io/development
repository: https://github.com/simplezen/simple-telephony
issue_tracker: https://github.com/simplezen/simple-telephony/issues

topics:
  - telephony
  - phone
  - android
  - calling

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  simple_telephony_android:
    path: ../simple_telephony_android
  simple_telephony_platform_interface:
    path: ../simple_telephony_platform_interface

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: simple_telephony_android
