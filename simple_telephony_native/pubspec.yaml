name: simple_telephony_native
description: >-
  Android telephony plugin for Flutter. Receive and control phone calls via
  InCallService when registered as the default dialer. Supports foreground
  event streaming and background delivery with at-least-once guarantees.
version: 0.5.0
homepage: https://www.simplezen.io/development
repository: https://github.com/simplezen/simple-telephony
issue_tracker: https://github.com/simplezen/simple-telephony/issues

topics:
  - telephony
  - phone
  - android
  - calling

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  simple_telephony_android:
    path: ../simple_telephony_android
  simple_telephony_platform_interface:
    path: ../simple_telephony_platform_interface
  # simple_permissions_native owns access-state vocabulary across the
  # plugin family. simple_telephony_android's DeviceInfoHandler uses
  # simple_permissions_android's PermissionGuards to check
  # READ_PHONE_STATE; the root dep here is what makes Flutter's
  # plugin-loader wire :simple_permissions_android into the final
  # app's Gradle build. Role handling (ROLE_DIALER) is also owned by
  # simple-permissions — see its DefaultDialerApp permission type.
  simple_permissions_native: ^1.4.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: simple_telephony_android
