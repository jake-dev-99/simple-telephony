# Local-dev overrides for the federated sibling packages. pub
# publish ignores this file, so the published package pulls
# hosted versions from pub.dev per the constraints in
# pubspec.yaml.
dependency_overrides:
  simple_telephony_platform_interface:
    path: ../simple_telephony_platform_interface
  simple_telephony_android:
    path: ../simple_telephony_android
  # simple_telephony_android pulls simple_query ^0.6.0
  # transitively but pub.dev only has 0.2.0 published. Override
  # simple_query (and its federated siblings) to the in-flight
  # 0.6.0 source so resolution succeeds. Drop these once the
  # simple-query 0.6.0 release lands on pub.dev.
  simple_query:
    path: ../../simple-query/packages/simple_query
  simple_query_platform_interface:
    path: ../../simple-query/packages/simple_query_platform_interface
  simple_query_shared:
    path: ../../simple-query/packages/simple_query_shared
  simple_query_android:
    path: ../../simple-query/packages/simple_query_android
  simple_query_ios:
    path: ../../simple-query/packages/simple_query_ios
  simple_query_macos:
    path: ../../simple-query/packages/simple_query_macos
  simple_query_linux:
    path: ../../simple-query/packages/simple_query_linux
  simple_query_windows:
    path: ../../simple-query/packages/simple_query_windows
