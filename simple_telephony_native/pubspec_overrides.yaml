# Pre-publish path overrides — resolves `simple_permissions_native`
# against the sibling checkout while we wait for 1.4.0 to land on
# pub.dev. Drop the whole block once the released version matches
# the pubspec constraint; pubspec_overrides.yaml is ignored on
# `pub publish` so shipping with this file committed is fine, but
# removing it after the cross-plugin release cycle keeps the
# dev story honest.
dependency_overrides:
  simple_permissions_native:
    path: ../../simple-permissions
  simple_permissions_platform_interface:
    path: ../../simple-permissions/packages/simple_permissions_platform_interface
  simple_permissions_android:
    path: ../../simple-permissions/packages/simple_permissions_android
  simple_permissions_ios:
    path: ../../simple-permissions/packages/simple_permissions_ios
  simple_permissions_macos:
    path: ../../simple-permissions/packages/simple_permissions_macos
  simple_permissions_web:
    path: ../../simple-permissions/packages/simple_permissions_web
