# Dev-only override — uses the sibling path checkout of
# simple_permissions_native + simple_query (and their federated
# platform packages) + the in-repo simple_telephony siblings so the
# example app resolves to the local source for everything in the
# coordinated release. pub.dev still has older versions of all
# three plugins until the in-flight release PRs land.
dependency_overrides:
  simple_permissions_native:
    path: ../../../simple-permissions
  simple_permissions_platform_interface:
    path: ../../../simple-permissions/packages/simple_permissions_platform_interface
  simple_permissions_android:
    path: ../../../simple-permissions/packages/simple_permissions_android
  simple_permissions_ios:
    path: ../../../simple-permissions/packages/simple_permissions_ios
  simple_permissions_macos:
    path: ../../../simple-permissions/packages/simple_permissions_macos
  simple_permissions_web:
    path: ../../../simple-permissions/packages/simple_permissions_web
  simple_query:
    path: ../../../simple-query/packages/simple_query
  simple_query_platform_interface:
    path: ../../../simple-query/packages/simple_query_platform_interface
  simple_query_shared:
    path: ../../../simple-query/packages/simple_query_shared
  simple_query_android:
    path: ../../../simple-query/packages/simple_query_android
  simple_query_ios:
    path: ../../../simple-query/packages/simple_query_ios
  simple_query_macos:
    path: ../../../simple-query/packages/simple_query_macos
  simple_query_linux:
    path: ../../../simple-query/packages/simple_query_linux
  simple_query_windows:
    path: ../../../simple-query/packages/simple_query_windows
  simple_telephony_platform_interface:
    path: ../../simple_telephony_platform_interface
  simple_telephony_android:
    path: ../../simple_telephony_android
