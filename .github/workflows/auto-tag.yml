name: Auto-tag on merge

# Runs when a PR merges to `main`. Computes next versions per
# changed package, commits pubspec bumps, and pushes tags —
# which trigger publish.yml.
#
# See simple-permissions' auto-tag.yml for the canonical
# write-up of the versioning rule.

on:
  push:
    branches: [main]

jobs:
  autotag:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` — commit pubspec bump + push tags.
      # `actions:  write` — dispatch publish.yml via
      #   `gh workflow run` after tags land. Required because
      #   GitHub suppresses `push: tags` workflow triggers when
      #   the pusher is the default GITHUB_TOKEN, so we wake
      #   publish.yml through `workflow_dispatch` instead.
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute + apply version bumps
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA:  ${{ github.event.after }}
        run: |
          set -euo pipefail

          # Federated packages, sibling layout (no packages/ prefix).
          # Keep in sync with publish.yml's matrix + RELEASE.md's
          # tag-pattern table.
          declare -A pkgs=(
            [simple_telephony_native]="simple_telephony_native"
            [simple_telephony_platform_interface]="simple_telephony_platform_interface"
            [simple_telephony_android]="simple_telephony_android"
          )

          touched_any=false
          pending_tags=()

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git hash-object -t tree /dev/null)"
          fi

          changed_files="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"

          next_patch() {
            local v="$1"
            local base="${v%%-*}"
            IFS='.' read -r major minor patch <<< "$base"
            echo "${major}.${minor}.$((patch + 1))"
          }

          version_gt() {
            local a="${1%%-*}" b="${2%%-*}"
            [ "$(printf '%s\n%s\n' "$a" "$b" | sort -V | tail -1)" = "$a" ] \
              && [ "$a" != "$b" ]
          }

          # Authoritative answer to "what's the latest version a user
          # can `flutter pub get`." A git tag can exist without ever
          # reaching pub.dev (publish run that timed out, OIDC
          # misconfig, etc.); basing patch-bumps on git tags lets
          # those orphans drift git history past pub.dev.
          #
          # Distinguishes three outcomes via exit code so the caller
          # can react differently — collapsing them all into "fall back
          # to git tags" would re-introduce the orphan-tag drift this
          # patch is meant to prevent (a transient pub.dev 5xx during
          # auto-tag would silently use the local orphan tag, push a
          # newer version, and the orphan would become permanent).
          #
          #   exit 0  + version on stdout → ok, use it.
          #   exit 10 → pub.dev 404 (package not published yet). Caller
          #             may fall back to git tags (first-publish path).
          #   exit 20 → transient: 5xx, network/TLS, timeout, or 200
          #             with a body that jq can't parse. Caller MUST
          #             fail loudly rather than silently fall back.
          pubdev_latest() {
            local pkg="$1"
            local response http body version
            # `-S` preserved without `2>/dev/null` so curl's own error
            # messages (DNS failure, TLS handshake, timeout, …) surface
            # in the workflow log instead of being swallowed — exit 20
            # then has a paper trail the operator can act on.
            response="$(curl -sS --max-time 10 \
              -w $'\n%{http_code}' \
              "https://pub.dev/api/packages/${pkg}")" \
              || return 20
            http="${response##*$'\n'}"
            body="${response%$'\n'*}"
            case "$http" in
              200)
                version="$(echo "$body" \
                  | jq -r '.latest.version // empty' 2>/dev/null)" \
                  || {
                    printf '::warning::pubdev_latest(%s): jq could not parse 200 response body: %s\n' \
                      "$pkg" "$(printf '%s' "$body" | head -c 200 | tr '\n' ' ')" >&2
                    return 20
                  }
                if [ -z "$version" ]; then
                  printf '::warning::pubdev_latest(%s): 200 OK but .latest.version is empty: %s\n' \
                    "$pkg" "$(printf '%s' "$body" | head -c 200 | tr '\n' ' ')" >&2
                  return 20
                fi
                echo "$version"
                return 0
                ;;
              404) return 10 ;;
              *)
                printf '::warning::pubdev_latest(%s): HTTP %s — body: %s\n' \
                  "$pkg" "$http" "$(printf '%s' "$body" | head -c 200 | tr '\n' ' ')" >&2
                return 20
                ;;
            esac
          }

          for pkg in "${!pkgs[@]}"; do
            dir="${pkgs[$pkg]}"
            if ! echo "$changed_files" | grep -q "^${dir}/"; then
              continue
            fi

            pubspec_path="${dir}/pubspec.yaml"
            pubspec_v="$(grep '^version:' "$pubspec_path" \
              | sed 's/version:[[:space:]]*//' | tr -d '\r')"

            # pub.dev is the source of truth. Fall back to git tags
            # ONLY on a clean 404 (first-publish path). On transient
            # errors (5xx, network, parse), fail the whole workflow —
            # silently using local tags would silently drift git past
            # pub.dev, which is exactly what this patch prevents.
            set +e
            last_published="$(pubdev_latest "$pkg")"
            pd_status=$?
            set -e
            case "$pd_status" in
              0)
                source="pub.dev"
                ;;
              10)
                last_published="$(git tag --list "${pkg}-v*" \
                  | sed "s/^${pkg}-v//" \
                  | sort -V | tail -1 || true)"
                if [ -n "$last_published" ]; then
                  source="git-tag-fallback (pub.dev 404)"
                else
                  source="unpublished (pub.dev 404, no git tags)"
                fi
                ;;
              *)
                echo "::error::pubdev_latest($pkg) failed with code $pd_status — transient pub.dev or network error. Re-run the workflow once pub.dev is healthy. Aborting to avoid silently drifting git tags past published versions."
                exit 1
                ;;
            esac

            if [ -z "$last_published" ]; then
              candidate="$pubspec_v"
            else
              candidate="$(next_patch "$last_published")"
            fi

            if version_gt "$pubspec_v" "$candidate"; then
              next="$pubspec_v"
            else
              next="$candidate"
            fi

            echo "::notice::$pkg pubspec=$pubspec_v last_published=${last_published:-<none>} (source=$source) next=$next"

            if [ "$pubspec_v" != "$next" ]; then
              sed -i -E "s/^version:[[:space:]]*.*$/version: $next/" "$pubspec_path"
              git add "$pubspec_path"
              touched_any=true
            fi

            pending_tags+=("${pkg}-v${next}")
          done

          if [ "$touched_any" = "true" ]; then
            git commit -m "chore(release): auto-bump pubspec versions [skip ci]"
          fi

          tags_to_push=()
          for tag in "${pending_tags[@]}"; do
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::notice::tag $tag already exists — skipping"
              continue
            fi
            git tag "$tag"
            tags_to_push+=("$tag")
          done

          if [ "$touched_any" = "true" ] || [ "${#tags_to_push[@]}" -gt 0 ]; then
            git push --atomic origin HEAD "${tags_to_push[@]}"
          fi

          # Expose pushed tags to the dispatch step below.
          printf 'new_tags=%s\n' "${tags_to_push[*]}" >> "$GITHUB_ENV"

      - name: Dispatch publish workflow per new tag
        if: ${{ env.new_tags != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # `--ref "$tag"` runs publish.yml as if triggered by the
          # tag push, so the OIDC token's `ref` claim is
          # `refs/tags/<tag>`. pub.dev's automated-publishing
          # policy validates that against the configured tag
          # pattern — without it the claim is `refs/heads/main`
          # and OIDC is silently rejected, falling back to
          # interactive OAuth that no one is there to answer.
          for tag in $new_tags; do
            echo "Dispatching publish.yml for $tag (ref=$tag)"
            gh workflow run publish.yml --ref "$tag" -f tag="$tag"
          done
