name: Claude

# Claude Code GitHub Action — listens for PR events and
# responds asynchronously. See
# simple-permissions/.github/workflows/claude.yml for the
# canonical setup doc.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  claude:
    if: |
      !(github.event_name == 'pull_request' &&
        github.event.pull_request.user.login == 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
