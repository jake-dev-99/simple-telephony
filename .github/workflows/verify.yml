name: Verify

# Verifies a change before it lands on main: runs on every PR
# targeting main and on every direct push to main (which only
# happens via the "Cut Release" workflow's bot bypass).
# Single-branch model: feature branches PR directly into main,
# releases are cut via the "Cut Release" workflow which tags +
# triggers the "Deploy" workflow.
#
# simple_telephony_native path-overrides simple-permissions for
# PermissionGuards during pre-publish cycles, and simple_telephony_*
# packages override simple-query to its in-flight 0.6.0 source until
# that release lands on pub.dev. CI lays both sibling checkouts
# alongside this repo under the workspace so relative paths
# (`../../simple-permissions`, `../../simple-query`) resolve during
# `flutter pub get`.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual override for re-running the gate against a specific ref.
  workflow_dispatch:

jobs:
  package-tests:
    name: Analyze + test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - simple_telephony_native
          - simple_telephony_platform_interface
          - simple_telephony_android

    steps:
      - name: Checkout simple-telephony
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: simple-telephony

      - name: Checkout simple-permissions (sibling dep)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: jake-dev-99/simple-permissions
          ref: main
          path: simple-permissions

      - name: Checkout simple-query (sibling dep, pre-publish 0.6.0)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: jake-dev-99/simple-query
          ref: main
          path: simple-query

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable

      - name: Install dependencies
        working-directory: simple-telephony/${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: simple-telephony/${{ matrix.package }}
        # invalid_dependency warning on path-overrides is
        # expected during pre-publish dev; drop warning
        # fatality so it doesn't block the gate.
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        working-directory: simple-telephony/${{ matrix.package }}
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory — skipping."
          fi

      # Note: validate-publishability dry-run intentionally omitted in
      # this Phase A revision. Main pubspec.yaml currently has path-deps
      # that pub publish rejects (the path→hosted dep split lives in
      # pubspec_overrides.yaml on develop). The step lands via the
      # develop→main bridge merge in Phase B and comes back automatically.
