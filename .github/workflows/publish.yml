name: Publish to pub.dev

# Triggered by tag pushes on `main` matching one of the federated
# packages' tag prefixes. Tags are created by `release.yml`
# (workflow_dispatch). There is no auto-tag step; tags only exist
# when a human deliberately cuts one. This eliminates the orphan-tag
# drift class that plagued the previous auto-tag.yml flow.
#
# Each `publish-*` job uses the canonical
# `dart-lang/setup-dart/.github/workflows/publish.yml@v1` reusable
# workflow, which handles OIDC token exchange with pub.dev.

on:
  push:
    tags:
      - 'simple_telephony_native-v*'
      - 'simple_telephony_platform_interface-v*'
      - 'simple_telephony_android-v*'

jobs:
  publish-native:
    if: startsWith(github.ref, 'refs/tags/simple_telephony_native-v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: simple_telephony_native

  publish-platform-interface:
    if: startsWith(github.ref, 'refs/tags/simple_telephony_platform_interface-v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: simple_telephony_platform_interface

  publish-android:
    if: startsWith(github.ref, 'refs/tags/simple_telephony_android-v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: simple_telephony_android
