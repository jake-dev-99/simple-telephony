name: Publish to pub.dev

# Triggered by tag pushes on `main` matching one of three
# federated packages' tag prefixes. See docs/RELEASE.md for
# the cut-a-release runbook + required one-time pub.dev
# "Automated publishing" setup per package.
#
# Tag patterns use GitHub Actions glob syntax, not regex;
# the verify-version step enforces exact semver.
on:
  push:
    tags:
      - 'simple_telephony_native-v*'
      - 'simple_telephony_platform_interface-v*'
      - 'simple_telephony_android-v*'

jobs:
  publish:
    # Job-level `if:` picks exactly one matrix entry whose
    # prefix matches the incoming tag, so non-matching
    # packages never even spin up a runner.
    if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - name: simple_telephony_native
            path: simple_telephony_native
          - name: simple_telephony_platform_interface
            path: simple_telephony_platform_interface
          - name: simple_telephony_android
            path: simple_telephony_android

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        working-directory: ${{ matrix.package.path }}
        run: dart pub get

      - name: Verify pubspec version matches tag
        working-directory: ${{ matrix.package.path }}
        run: |
          tag_ref="${GITHUB_REF#refs/tags/}"
          expected="${tag_ref#${{ matrix.package.name }}-v}"
          actual="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag ${tag_ref} does not match pubspec version ${actual} (expected ${expected})"
            exit 1
          fi

      - name: Publish
        working-directory: ${{ matrix.package.path }}
        run: dart pub publish --force
