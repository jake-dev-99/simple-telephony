name: Publish to pub.dev

# Triggered by tag pushes on `main` matching one of the federated
# packages' tag prefixes. Tags are created by `release.yml`
# (workflow_dispatch). There is no auto-tag step; tags only exist
# when a human deliberately cuts one. This eliminates the orphan-tag
# drift class that plagued the previous auto-tag.yml flow.
#
# Per-package matrix using subosito/flutter-action + flutter pub
# publish --force --skip-validation. `--skip-validation` lets pub
# publish work for Flutter packages (skips resolution which trips
# on `sdk: flutter`); pub.dev's server still enforces version
# monotonicity, ownership, and OIDC binding.

on:
  push:
    tags:
      - 'simple_telephony_native-v*'
      - 'simple_telephony_platform_interface-v*'
      - 'simple_telephony_android-v*'

jobs:
  publish:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - name: simple_telephony_native
            path: simple_telephony_native
          - name: simple_telephony_platform_interface
            path: simple_telephony_platform_interface
          - name: simple_telephony_android
            path: simple_telephony_android

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        with:
          fetch-depth: 0  # full history for the ancestry check

      - name: Verify tag commit is on main
        # `on.push.tags` is not branch-scoped — a tag from any branch
        # would otherwise trigger publish. release.yml normally only
        # tags from main, but verify independently.
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF#refs/tags/} does not point to a commit on origin/main. Aborting publish."
            exit 1
          fi

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        with:
          channel: stable

      - name: Verify pubspec version matches tag
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          expected="${tag#${{ matrix.package.name }}-v}"
          actual="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag ${tag} does not match pubspec version ${actual} (expected ${expected})"
            exit 1
          fi

      - name: Install dependencies
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: flutter pub get

      - name: Publish
        timeout-minutes: 2
        if: startsWith(github.ref, format('refs/tags/{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: flutter pub publish --force --skip-validation
