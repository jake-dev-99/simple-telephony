name: Publish to pub.dev

# Triggered by tag pushes on `main` matching one of three
# federated packages' tag prefixes. See docs/RELEASE.md for
# the cut-a-release runbook + required one-time pub.dev
# "Automated publishing" setup per package.
#
# Tag patterns use GitHub Actions glob syntax, not regex;
# the verify-version step enforces exact semver.
#
# Two triggers, both needed:
#
#   push: tags — still wired so a manually-pushed tag (human-
#     cut release) publishes without extra steps.
#
#   workflow_dispatch — the auto-tag workflow runs on main
#     merges, creates tags, and pushes them with the default
#     GITHUB_TOKEN. GitHub suppresses `push: tags` workflow
#     triggers when the pusher is the runner's own token
#     (anti-infinite-loop), so without this entrypoint every
#     auto-tag landed without a publish run. auto-tag now
#     calls `gh workflow run publish.yml -f tag=<tag>` per
#     new tag; workflow_dispatch is the one event that *does*
#     fire from GITHUB_TOKEN.
on:
  push:
    tags:
      - 'simple_telephony_native-v*'
      - 'simple_telephony_platform_interface-v*'
      - 'simple_telephony_android-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Package tag to publish (e.g. simple_telephony_native-v0.5.0)'
        required: true
        type: string

jobs:
  publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - name: simple_telephony_native
            path: simple_telephony_native
          - name: simple_telephony_platform_interface
            path: simple_telephony_platform_interface
          - name: simple_telephony_android
            path: simple_telephony_android

    # Per-step `if:` rather than job-level: GitHub Actions
    # evaluates job-level `if:` before matrix expansion, so
    # `matrix.package.name` can't be referenced there.
    steps:
      # Normalise tag source across `push` (GITHUB_REF) and
      # `workflow_dispatch` (input). Subsequent steps gate on
      # the resolved tag so both trigger paths work with one
      # set of conditions.
      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            ref="refs/tags/$tag"
          else
            tag="${GITHUB_REF#refs/tags/}"
            ref="$GITHUB_REF"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: startsWith(steps.resolve.outputs.tag, format('{0}-v', matrix.package.name))
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      # Flutter plugin packages (pubspec pins `sdk: flutter`), so
      # `dart pub` can't resolve — pub reports:
      #   "Because <pkg> requires the Flutter SDK, version solving
      #    failed. Flutter users should use `flutter pub` instead
      #    of `dart pub`."
      # Use the Flutter toolchain and call `flutter pub ...`
      # throughout. pub.dev's OIDC publish works identically.
      - uses: subosito/flutter-action@v2
        if: startsWith(steps.resolve.outputs.tag, format('{0}-v', matrix.package.name))
        with:
          channel: stable

      - name: Install dependencies
        if: startsWith(steps.resolve.outputs.tag, format('{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: flutter pub get

      - name: Verify pubspec version matches tag
        if: startsWith(steps.resolve.outputs.tag, format('{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          expected="${tag#${{ matrix.package.name }}-v}"
          actual="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag ${tag} does not match pubspec version ${actual} (expected ${expected})"
            exit 1
          fi

      - name: Publish
        # 2-minute cap. A healthy OIDC-backed publish finishes in
        # 10-30 s; anything much longer means pub fell back to the
        # interactive OAuth flow (which happens if the OIDC token's
        # `ref` claim doesn't match pub.dev's configured tag
        # pattern). Better to fail fast than sit on the runner for
        # 40+ minutes waiting for someone to click a browser link
        # that will never arrive.
        timeout-minutes: 2
        if: startsWith(steps.resolve.outputs.tag, format('{0}-v', matrix.package.name))
        working-directory: ${{ matrix.package.path }}
        run: flutter pub publish --force
