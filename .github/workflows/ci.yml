name: CI

# Runs on every PR against the three promotion-flow branches
# (develop -> staging -> main). CD handles merge + tag side.
#
# simple_telephony_native path-overrides simple-permissions for
# PermissionGuards during pre-publish cycles, and simple_telephony_*
# packages override simple-query to its in-flight 0.6.0 source until
# that release lands on pub.dev. CI lays both sibling checkouts
# alongside this repo under the workspace so relative paths
# (`../../simple-permissions`, `../../simple-query`) resolve during
# `flutter pub get`.
on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  package-tests:
    name: Analyze + test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - simple_telephony_native
          - simple_telephony_platform_interface
          - simple_telephony_android

    steps:
      - name: Checkout simple-telephony
        uses: actions/checkout@v4
        with:
          path: simple-telephony

      - name: Checkout simple-permissions (sibling dep)
        uses: actions/checkout@v4
        with:
          repository: jake-dev-99/simple-permissions
          ref: main
          path: simple-permissions

      - name: Checkout simple-query (sibling dep, pre-publish 0.6.0)
        uses: actions/checkout@v4
        with:
          repository: jake-dev-99/simple-query
          ref: main
          path: simple-query

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: simple-telephony/${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: simple-telephony/${{ matrix.package }}
        # invalid_dependency warning on path-overrides is
        # expected during pre-publish dev; drop warning
        # fatality so it doesn't block the gate.
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        working-directory: simple-telephony/${{ matrix.package }}
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory — skipping."
          fi

      # Validate publishability at CI time so publish-blocking issues
      # (missing LICENSE, malformed pubspec, oversize files, missing
      # repository/issue_tracker URLs) surface before merge instead of
      # after a tag push. CD then publishes with --skip-validation so
      # the same checks aren't re-run on the publish runner where
      # `pubspec_overrides.yaml` hints would otherwise clutter the log
      # and an interactive OAuth flow could stall the job.
      #
      # `--dry-run` exits 0 even when pub emits hints (the in-flight
      # `pubspec_overrides.yaml` warning during pre-publish dev) so it
      # doesn't falsely fail develop branches; only hard errors block.
      - name: Validate publishability (pub publish --dry-run)
        # 2-minute cap, matching the publish step in publish.yml. A
        # healthy `--dry-run` finishes in 10-30 s; anything longer
        # means pub is wedged on dependency resolution or a runaway
        # file walk. Fail fast rather than burn a runner.
        timeout-minutes: 2
        working-directory: simple-telephony/${{ matrix.package }}
        run: flutter pub publish --dry-run

