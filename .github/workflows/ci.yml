name: CI

# Runs on every PR against the three promotion-flow branches
# (develop -> staging -> main). CD (publish.yml) handles the
# merge + tag side.
on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  package-tests:
    name: Analyze + test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - simple_telephony_native
          - simple_telephony_platform_interface
          - simple_telephony_android

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze

      - name: Run tests
        working-directory: ${{ matrix.package }}
        # The android package sometimes has no Dart tests (native
        # surface only); don't fail in that case.
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory — skipping."
          fi

  format:
    name: dart format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check formatting
        run: dart format --set-exit-if-changed .
