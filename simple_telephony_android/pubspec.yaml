name: simple_telephony_android
description: >-
  Android implementation of the simple_telephony_native plugin.
version: 0.2.0
homepage: https://www.simplezen.io/development

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  simple_telephony_platform_interface:
    path: ../simple_telephony_platform_interface
  # Used by SimpleTelephonyAndroid.listCallLog to query the call-log
  # content provider. Device-info / SIM-card methods go through a dedicated
  # native MethodChannel instead (not a content-provider query).
  simple_query: ^0.2.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: simple_telephony_native
    platforms:
      android:
        package: io.simplezen.simple_telecom
        pluginClass: SimpleTelecomPlugin
        dartPluginClass: SimpleTelephonyAndroid
