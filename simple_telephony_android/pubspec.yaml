name: simple_telephony_android
description: >-
  Android implementation of the simple_telephony_native plugin.
version: 0.5.0
homepage: https://www.simplezen.io/development
repository: https://github.com/simplezen/simple-telephony
issue_tracker: https://github.com/simplezen/simple-telephony/issues

topics:
  - telephony
  - phone
  - android
  - calling

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Used by SimpleTelephonyAndroid.listCallLog to query the call-log
  # content provider. Device-info / SIM-card methods go through a dedicated
  # native MethodChannel instead (not a content-provider query).

  simple_query: ^0.2.0
  simple_telephony_platform_interface: ^0.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: simple_telephony_native
    platforms:
      android:
        package: io.simplezen.simple_telephony
        pluginClass: SimpleTelephonyPlugin
        dartPluginClass: SimpleTelephonyAndroid
