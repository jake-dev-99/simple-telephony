name: simple_telephony
description: >-
  Android telephony plugin for Flutter. Receive and control phone calls via
  InCallService when registered as the default dialer. Supports foreground
  event streaming and background delivery with at-least-once guarantees.
version: 0.1.0
homepage: https://www.simplezen.io/development

topics:
  - telephony
  - phone
  - android
  - calling

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: io.simplezen.simple_telecom
        pluginClass: SimpleTelecomPlugin
